syntax = "proto3";

package layoutinspector.compose.inspection;

option java_package = "layoutinspector.compose.inspection";
option java_outer_classname = "LayoutInspectorComposeProtocol";
option java_multiple_files = true;

// Main command wrapper
message Command {
  oneof specialized {
    GetComposablesCommand get_composables_command = 1;
    GetParametersCommand get_parameters_command = 2;
    GetAllParametersCommand get_all_parameters_command = 3;
    GetParameterDetailsCommand get_parameter_details_command = 4;
    UpdateSettingsCommand update_settings_command = 5;
  }
}

// Main response wrapper
message Response {
  oneof specialized {
    GetComposablesResponse get_composables_response = 1;
    GetParametersResponse get_parameters_response = 2;
    GetAllParametersResponse get_all_parameters_response = 3;
    GetParameterDetailsResponse get_parameter_details_response = 4;
    UpdateSettingsResponse update_settings_response = 5;
  }
}

// Commands

message GetComposablesCommand {
  int64 root_view_id = 1;
  int32 generation = 2;
  bool extract_all_parameters = 3;
}

message GetParametersCommand {
  int64 root_view_id = 1;
  int64 composable_id = 2;
  int32 anchor_hash = 3;
  int32 generation = 4;
}

message GetAllParametersCommand {
  int64 root_view_id = 1;
  int32 generation = 2;
}

message GetParameterDetailsCommand {
  int64 root_view_id = 1;
  ParameterReference reference = 2;
  int32 start_index = 3;
  int32 max_elements = 4;
  bool skip_system_composables = 5;
  int32 generation = 6;
}

message UpdateSettingsCommand {
  bool include_recompose_counts = 1;
  bool keep_recompose_counts = 2;
  bool include_all_parameters = 3;
  bool delay_parameter_extraction = 4;
}

// Responses

message GetComposablesResponse {
  repeated StringEntry strings = 1;
  repeated ComposableRoot roots = 2;
}

message GetParametersResponse {
  repeated StringEntry strings = 1;
  int64 composable_id = 2;
  repeated ParameterGroup parameter_groups = 3;
}

message GetAllParametersResponse {
  repeated StringEntry strings = 1;
  repeated ComposableParameters root_parameters = 2;
}

message GetParameterDetailsResponse {
  repeated StringEntry strings = 1;
  int64 root_view_id = 2;
  ParameterReference reference = 3;
  Parameter expanded_parameter = 4;
}

message UpdateSettingsResponse {
  bool can_inspect_recompose_counts = 1;
  bool can_delay_parameter_extraction = 2;
}

// Data structures

message StringEntry {
  int32 id = 1;
  string str = 2;
}

message ComposableRoot {
  int64 view_id = 1;
  repeated ComposableNode nodes = 2;
  int32 recompose_count = 3;
  int32 skip_count = 4;
}

message ComposableNode {
  int64 id = 1;
  repeated ComposableNode children = 2;  // Recursive children
  int64 anchor_hash = 3;
  int32 filename = 4;   // String table index
  int32 line_number = 5;
  int32 offset = 6;
  int32 name = 7;       // String table index
  Quad bounds = 8;
  int32 flags = 9;
  int32 package_hash = 10;
  int32 recompose_count = 11;
  int32 skip_count = 12;
  int64 view_id = 13;
  repeated RenderNode render_nodes = 14;
  bool has_merged_semantics = 15;
  bool has_unmerged_semantics = 16;
}

message RenderNode {
  int64 id = 1;
  Quad bounds = 2;
  repeated RenderNode children = 3;
}

// Bounds can have two formats:
// 1. Direct Quad: x0,y0,x1,y1,x2,y2,x3,y3
// 2. Nested Size in field 1: { size { width, height } }
message Quad {
  QuadSize size = 1;  // Nested size (for simple rect bounds)
  int32 x0 = 2;
  int32 y0 = 3;
  int32 x1 = 4;
  int32 y1 = 5;
  int32 x2 = 6;
  int32 y2 = 7;
  int32 x3 = 8;
  int32 y3 = 9;
}

message QuadSize {
  int32 x = 1;
  int32 y = 2;
  int32 width = 3;
  int32 height = 4;
}

message ComposableParameters {
  int64 composable_id = 1;
  repeated ParameterGroup parameter_groups = 2;
}

message ParameterGroup {
  int32 kind = 1;
  repeated Parameter parameters = 2;
}

message Parameter {
  int32 name = 1;        // String table index
  int32 type = 2;        // ParameterType enum
  oneof value {
    int32 int32_value = 3;
    int64 int64_value = 4;
    double double_value = 5;
    float float_value = 6;
    string string_value = 7;
    ParameterReference reference = 8;
    LambdaValue lambda_value = 9;
    FunctionReference function_reference = 10;
  }
  int32 index = 11;
  repeated Parameter elements = 12;
}

message ParameterReference {
  int64 composable_id = 1;
  int32 anchor_hash = 2;
  int32 kind = 3;
  int32 parameter_index = 4;
  repeated int32 composite_indices = 5;
}

message LambdaValue {
  int32 package_name = 1;    // String table index
  int32 file_name = 2;       // String table index
  int32 lambda_name = 3;     // String table index
  int32 start_line_number = 4;
  int32 end_line_number = 5;
  int32 function_name = 6;   // String table index
}

message FunctionReference {
  int32 package_name = 1;    // String table index
  int32 class_name = 2;      // String table index
  int32 function_name = 3;   // String table index
}

// Events (streamed from device)
message Event {
  oneof specialized {
    StateReadEvent state_read_event = 1;
  }
}

message StateReadEvent {
  repeated StringEntry strings = 1;
  repeated StateRead state_reads = 2;
}

message StateRead {
  int64 composable_id = 1;
  int32 anchor_hash = 2;
  int32 variable_name = 3;  // String table index
}
